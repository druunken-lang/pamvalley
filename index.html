<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>팜밸리 리조트 관리 시스템</title>
    <!-- 외부 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin></script>
    
    <!-- Firebase SDK (Compatibility Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" crossorigin></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" crossorigin></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" crossorigin></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        select { appearance: none; outline: none; }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- [중요] 사장님의 Firebase 설정값을 여기에 입력하세요 ---
        // (Vercel 배포 시에는 깃허브에 올릴 때 이 값을 채워서 올리셔야 합니다.)
        const localFirebaseConfig = {
            apiKey: apiKey: "AIzaSyCuSlWnlJZaweJBxnJkwFosaNLkS4TeFZw",
  authDomain: "pamvalley.firebaseapp.com",
  projectId: "pamvalley",
  storageBucket: "pamvalley.firebasestorage.app",
  messagingSenderId: "416491848308",
  appId: "1:416491848308:web:c48d475974fdd8a2170721",
  measurementId: "G-0X7WM34SH7"
        };

        // 환경 변수 또는 직접 입력 값 사용
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : localFirebaseConfig;

        // Firebase 초기화 방어 로직
        let auth = null;
        let db = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pamvalley-resort-final';
        const isFirebaseConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "";

        if (isFirebaseConfigured) {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                auth = firebase.auth();
                db = firebase.firestore();
            } catch (e) {
                console.error("Firebase 초기화 중 오류 발생:", e);
            }
        }

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [rooms, setRooms] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedRoom, setSelectedRoom] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [now, setNow] = useState(new Date());
            const [isSaving, setIsSaving] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");

            const STATUS = {
                vacant: { label: '공실', color: 'bg-white border-dashed border-slate-300 text-slate-400', icon: 'home' },
                reserved: { label: '입실예정', color: 'bg-orange-50 border-orange-200 text-orange-800', icon: 'clock' },
                checkedIn: { label: '입실완료', color: 'bg-emerald-50 border-emerald-200 text-emerald-800', icon: 'user-check' },
                occupied: { label: '재실', color: 'bg-blue-50 border-blue-200 text-blue-800', icon: 'user' },
                checkout: { label: '퇴실', color: 'bg-slate-100 border-slate-300 text-slate-700', icon: 'log-out' }
            };

            const BBQ_TIMES = ["15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00"];

            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const generateInitialRooms = () => {
                const initial = [
                    ...Array.from({length: 6}, (_, i) => ({ id: i+1, name: `코코스빌 ${i+1}호`, capacity: 2 })),
                    ...Array.from({length: 6}, (_, i) => ({ id: i+7, name: `까멜빌 ${i+1}호`, capacity: 4 })),
                    ...Array.from({length: 2}, (_, i) => ({ id: i+13, name: `오션빌 ${i+1}호`, capacity: 6 })),
                    ...Array.from({length: 3}, (_, i) => ({ id: i+15, name: `워싱턴빌 ${i+1}호`, capacity: 6 }))
                ];
                return initial.map(r => ({
                    ...r, status: 'vacant', guestName: '', memo: '', guestCount: r.capacity,
                    hasBBQ: false, bbqTime: '', hasFirePit: false,
                    isWaterChecked: false, isTowelChecked: false, isBeddingChecked: false,
                    isTvChecked: false, isLightChecked: false, isBoilerChecked: false, isAcChecked: false,
                    isVentChecked: false, isCutleryChecked: false, isCookingUtensilChecked: false,
                    isTrashBagChecked: false, isHairDryerChecked: false, isMosquitoRepellentChecked: false,
                    isWindowLockedChecked: false, isJjimjilChecked: false,
                    isCheckoutBoilerChecked: false, isCheckoutAcChecked: false, isCheckoutDoorChecked: false
                }));
            };

            // 인증 로직 (RULE 3 준수)
            useEffect(() => {
                if (!isFirebaseConfigured) {
                    setRooms(generateInitialRooms());
                    setLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("인증 실패:", err);
                        setErrorMessage(`로그인 오류: ${err.code} - ${err.message}`);
                    }
                };

                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            // 데이터 동기화 로직 (유효한 세션 필수)
            useEffect(() => {
                if (!user || !db) return;

                // RULE 1: 정해진 경로 사용
                const roomsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('hotel_rooms_v15');
                
                // RULE 2: 서버 정렬 대신 클라이언트 정렬
                const unsubscribe = roomsRef.onSnapshot(snapshot => {
                    if (snapshot.empty) {
                        const initial = generateInitialRooms();
                        initial.forEach(r => roomsRef.doc(`room-${r.id}`).set(r));
                    } else {
                        const list = [];
                        snapshot.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                        list.sort((a, b) => a.id - b.id);
                        setRooms(list);
                        setLoading(false);
                        setErrorMessage(""); // 정상 로드 시 에러 제거
                    }
                }, err => {
                    console.error("데이터 동기화 에러:", err);
                    setErrorMessage(`데이터를 가져오지 못했습니다: [${err.code}] ${err.message}`);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const getCheckStatus = (room) => {
                if (room.status === 'vacant') return null;
                const guestCount = room.guestCount || room.capacity;
                const needsBedding = guestCount > room.capacity;
                const isWashington = room.name && room.name.includes('워싱턴빌');

                if (room.status === 'reserved') {
                    const checks = [room.isWaterChecked, room.isTowelChecked, room.isTvChecked, room.isLightChecked, room.isBoilerChecked, room.isAcChecked, room.isVentChecked, room.isCutleryChecked, room.isCookingUtensilChecked, room.isTrashBagChecked, room.isHairDryerChecked, room.isMosquitoRepellentChecked, room.isWindowLockedChecked];
                    if (needsBedding) checks.push(room.isBeddingChecked);
                    if (isWashington) checks.push(room.isJjimjilChecked);
                    return checks.every(Boolean);
                } 
                if (['occupied', 'checkedIn'].includes(room.status)) {
                    const checks = [room.isWaterChecked, room.isTowelChecked];
                    if (needsBedding) checks.push(room.isBeddingChecked);
                    return checks.every(Boolean);
                }
                if (room.status === 'checkout') {
                    return [room.isCheckoutBoilerChecked, room.isCheckoutAcChecked, room.isCheckoutDoorChecked].every(Boolean);
                }
                return null;
            };

            const handleQuickUpdate = async (e, room, field, value) => {
                e.stopPropagation();
                if (!user) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('hotel_rooms_v15').doc(room.docId).update({ [field]: value });
                } catch (err) {
                    console.error("수정 실패:", err);
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (isSaving || !user) return;
                setIsSaving(true);

                try {
                    const isVacant = selectedRoom.status === 'vacant';
                    let data = { ...selectedRoom, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                    
                    if (isVacant) {
                        Object.assign(data, {
                            guestName: '', guestCount: selectedRoom.capacity, hasBBQ: false, bbqTime: '', hasFirePit: false,
                            isWaterChecked: false, isTowelChecked: false, isBeddingChecked: false, isTvChecked: false, isLightChecked: false,
                            isBoilerChecked: false, isAcChecked: false, isVentChecked: false, isCutleryChecked: false, isCookingUtensilChecked: false,
                            isTrashBagChecked: false, isHairDryerChecked: false, isMosquitoRepellentChecked: false,
                            isWindowLockedChecked: false, isJjimjilChecked: false,
                            isCheckoutBoilerChecked: false, isCheckoutAcChecked: false, isCheckoutDoorChecked: false
                        });
                    }

                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('hotel_rooms_v15').doc(selectedRoom.docId).set(data);
                    setIsModalOpen(false);
                } catch (err) {
                    console.error("저장 실패:", err);
                    setErrorMessage(`저장에 실패했습니다: [${err.code}]`);
                } finally {
                    setIsSaving(false);
                }
            };

            if (loading && !errorMessage) return (
                <div className="flex h-screen flex-col items-center justify-center bg-white">
                    <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-black text-slate-400">팜밸리 시스템 연결 중...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-10 bg-slate-50 relative">
                    {!isFirebaseConfigured && (
                        <div className="absolute inset-0 z-50 bg-slate-900/90 flex flex-col items-center justify-center p-8 text-center backdrop-blur-md">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl">
                                <div className="bg-rose-100 text-rose-600 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                    <Icon name="alert-circle" size={32} />
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 mb-4 tracking-tighter leading-tight">Firebase 설정이<br/>필요합니다</h2>
                                <p className="text-slate-500 text-sm font-medium mb-8 leading-relaxed text-center">
                                    사장님, 실시간 저장을 위해서는<br/>코드 상단의 <strong>firebaseConfig</strong> 안에<br/>API 키값들을 입력해주셔야 합니다.
                                </p>
                            </div>
                        </div>
                    )}

                    <header className="bg-white p-6 shadow-sm sticky top-0 z-30 flex justify-between items-end border-b">
                        <div>
                            <h1 className="text-2xl font-black text-blue-600 tracking-tighter leading-none">팜밸리 리조트</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Smart Management</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[11px] font-bold text-slate-500">{now.toLocaleDateString('ko-KR', {month:'long',day:'numeric',weekday:'short'})}</p>
                            <p className="text-xl font-black font-mono leading-none text-slate-800">{now.toLocaleTimeString('ko-KR', {hour12:false})}</p>
                        </div>
                    </header>

                    {errorMessage && (
                        <div className="m-4 p-4 bg-rose-50 border border-rose-200 rounded-2xl">
                            <div className="flex items-center gap-2 mb-2 text-rose-700 font-black text-sm">
                                <Icon name="alert-circle" size={16} /> 오류 발생
                            </div>
                            <p className="text-[11px] text-rose-600 font-bold leading-relaxed whitespace-pre-wrap">
                                {errorMessage}
                                {"\n\n"}* 해결방법: Firebase 콘솔에서 Firestore를 '테스트 모드'로 활성화했는지, 익명 로그인을 켰는지 확인해 주세요.
                            </p>
                        </div>
                    )}

                    {/* 객실 그리드 영역 (동일함) */}
                    <main className="p-4 grid grid-cols-2 gap-4">
                        {rooms.map(room => {
                            const style = STATUS[room.status] || STATUS.vacant;
                            const isDone = getCheckStatus(room);
                            return (
                                <div key={room.id} onClick={() => { setSelectedRoom({...room}); setIsModalOpen(true); }}
                                     className={`relative flex flex-col rounded-[1.8rem] border-2 p-4 shadow-sm transition-all active:scale-95 cursor-pointer ${style.color}`}>
                                    <div className="flex justify-between items-start mb-3">
                                        <span className="text-base font-black tracking-tight leading-none pt-1">{room.name}</span>
                                        <Icon name={style.icon} size={16} className="opacity-30" />
                                    </div>
                                    <div className="flex items-center gap-1.5 mb-2.5">
                                        <span className="text-[11px] font-black">{style.label}</span>
                                        {isDone !== null && (
                                            <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-full ${isDone ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`}>
                                                {isDone ? '체크완료' : '점검중'}
                                            </span>
                                        )}
                                    </div>
                                    <div className="text-[11px] font-bold text-slate-500 mb-4 opacity-80">
                                        {['reserved','checkedIn','occupied'].includes(room.status) ? `투숙 ${room.guestCount}명` : `기준 ${room.capacity}인`}
                                    </div>
                                    <div className="flex flex-wrap gap-2 mb-4" onClick={e => e.stopPropagation()}>
                                        <div className="flex items-center gap-1">
                                            <label className="flex items-center gap-1.5 bg-white/80 px-2 py-1.5 rounded-xl text-[10px] font-black shadow-sm border border-black/5 active:bg-white transition-colors">
                                                <input type="checkbox" checked={room.hasBBQ || false} onChange={e => handleQuickUpdate(e, room, 'hasBBQ', e.target.checked)} className="w-3.5 h-3.5 rounded-md border-slate-300 text-orange-600" /> 숯
                                            </label>
                                            {room.hasBBQ && (
                                                <select value={room.bbqTime || ""} onChange={e => handleQuickUpdate(e, room, 'bbqTime', e.target.value)} className="bg-white/90 rounded-xl px-1.5 text-[10px] font-black shadow-sm border-none h-[25px] ring-1 ring-orange-200">
                                                    <option value="">시간</option>
                                                    {BBQ_TIMES.map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                            )}
                                        </div>
                                        <label className="flex items-center gap-1.5 bg-white/80 px-2 py-1.5 rounded-xl text-[10px] font-black shadow-sm border border-black/5 active:bg-white transition-colors">
                                            <input type="checkbox" checked={room.hasFirePit || false} onChange={e => handleQuickUpdate(e, room, 'hasFirePit', e.target.checked)} className="w-3.5 h-3.5 rounded-md border-slate-300 text-red-600" /> 불멍
                                        </label>
                                    </div>
                                    <div className="mt-auto flex items-center justify-between pt-2 border-t border-black/5">
                                        <span className="text-[10px] font-bold truncate max-w-[70%] text-slate-700">{room.guestName || "-"}</span>
                                        {room.memo && <div className="w-2 h-2 rounded-full bg-yellow-400 shadow-[0_0_5px_rgba(250,204,21,0.8)]"></div>}
                                    </div>
                                </div>
                            );
                        })}
                    </main>

                    {/* 관리 모달 (이전과 동일) */}
                    {isModalOpen && selectedRoom && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-slate-900/60 p-4 backdrop-blur-sm sm:items-center">
                            <div className="animate-slide-up bg-white w-full max-w-sm rounded-t-[2.5rem] flex flex-col max-h-[92vh] shadow-2xl overflow-hidden sm:rounded-[2.5rem]">
                                <div className="p-7 border-b flex justify-between items-center bg-slate-50/50">
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-800 tracking-tighter leading-none">{selectedRoom.name}</h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Management Console</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-white border p-2.5 rounded-2xl text-slate-400 shadow-sm"><Icon name="x" size={24}/></button>
                                </div>

                                <form onSubmit={handleSave} className="p-7 overflow-y-auto space-y-8 no-scrollbar">
                                    <section>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-4 block tracking-widest">상태 설정</label>
                                        <div className="grid grid-cols-3 gap-2.5">
                                            {Object.entries(STATUS).map(([key, val]) => (
                                                <button key={key} type="button" onClick={() => setSelectedRoom({...selectedRoom, status: key})} 
                                                        className={`py-3.5 text-[12px] font-black rounded-2xl border-2 transition-all flex flex-col items-center gap-1 ${selectedRoom.status === key ? val.color + ' border-current scale-105 shadow-md' : 'border-slate-100 text-slate-300 hover:bg-slate-50'}`}>
                                                    {val.label}
                                                </button>
                                            ))}
                                        </div>
                                    </section>

                                    {(['reserved', 'occupied', 'checkedIn'].includes(selectedRoom.status)) && (
                                        <section className={`p-6 rounded-[2.2rem] border-2 space-y-6 ${selectedRoom.status === 'reserved' ? 'bg-orange-50 border-orange-100' : 'bg-blue-50 border-blue-100'}`}>
                                            <div className="flex items-center justify-between mb-2">
                                                <h3 className={`font-black text-sm ${selectedRoom.status === 'reserved' ? 'text-orange-800' : 'text-blue-800'}`}>비품 및 시설 점검</h3>
                                                <div className="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-xl shadow-sm border border-black/5">
                                                    <input type="number" min="1" value={selectedRoom.guestCount} 
                                                           onChange={e => setSelectedRoom({...selectedRoom, guestCount: parseInt(e.target.value)||1})} 
                                                           className="w-7 text-center text-xs font-black outline-none" />
                                                    <span className="text-[10px] font-bold text-slate-400">인</span>
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <label className="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm cursor-pointer active:bg-slate-50 transition-colors">
                                                    <span className="text-sm font-bold text-slate-700">생수 {selectedRoom.guestCount}개 비치</span>
                                                    <input type="checkbox" checked={selectedRoom.isWaterChecked || false} onChange={e => setSelectedRoom({...selectedRoom, isWaterChecked: e.target.checked})} className="w-6 h-6 rounded-lg border-slate-200 text-blue-600 focus:ring-0" />
                                                </label>
                                                <label className="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm cursor-pointer active:bg-slate-50 transition-colors">
                                                    <span className="text-sm font-bold text-slate-700">타올 {selectedRoom.guestCount * 2}장 비치</span>
                                                    <input type="checkbox" checked={selectedRoom.isTowelChecked || false} onChange={e => setSelectedRoom({...selectedRoom, isTowelChecked: e.target.checked})} className="w-6 h-6 rounded-lg border-slate-200 text-blue-600 focus:ring-0" />
                                                </label>
                                                {selectedRoom.guestCount > selectedRoom.capacity && (
                                                    <label className="flex items-center justify-between p-4 bg-white rounded-2xl border-orange-200 bg-orange-50/80 shadow-sm cursor-pointer border-2 animate-pulse">
                                                        <span className="text-sm font-black text-orange-700">침구류 {selectedRoom.guestCount - selectedRoom.capacity}세트 추가</span>
                                                        <input type="checkbox" checked={selectedRoom.isBeddingChecked || false} onChange={e => setSelectedRoom({...selectedRoom, isBeddingChecked: e.target.checked})} className="w-6 h-6 rounded-lg border-orange-300 text-orange-600 focus:ring-0" />
                                                    </label>
                                                )}
                                            </div>
                                            {selectedRoom.status === 'reserved' && (
                                                <div className="grid grid-cols-2 gap-3 pt-3 border-t border-black/5">
                                                    {[
                                                        { id: 'isTvChecked', label: 'TV' }, { id: 'isLightChecked', label: '전등' }, { id: 'isBoilerChecked', label: '보일러' },
                                                        { id: 'isAcChecked', label: '에어컨' }, { id: 'isVentChecked', label: '환풍기' }, { id: 'isCutleryChecked', label: '수저세트' },
                                                        { id: 'isCookingUtensilChecked', label: '조리도구' }, { id: 'isTrashBagChecked', label: '재활용봉투' }, { id: 'isHairDryerChecked', label: '드라이기' },
                                                        { id: 'isMosquitoRepellentChecked', label: '모기약' }, { id: 'isWindowLockedChecked', label: '창문잠금' }
                                                    ].map(item => (
                                                        <label key={item.id} className="flex items-center gap-2 p-3 bg-white/70 rounded-2xl border border-white cursor-pointer active:bg-white transition-all shadow-xs">
                                                            <input type="checkbox" checked={selectedRoom[item.id] || false} onChange={e => setSelectedRoom({...selectedRoom, [item.id]: e.target.checked})} className="w-4 h-4 rounded-lg border-slate-300 text-orange-600 focus:ring-0" />
                                                            <span className="text-[11px] font-bold text-slate-600 truncate">{item.label}</span>
                                                        </label>
                                                    ))}
                                                    {selectedRoom.name && selectedRoom.name.includes('워싱턴빌') && (
                                                        <label className="flex items-center gap-2 p-3 bg-rose-50 rounded-2xl border border-rose-100 cursor-pointer active:bg-rose-100 transition-all col-span-2 shadow-sm">
                                                            <input type="checkbox" checked={selectedRoom.isJjimjilChecked || false} onChange={e => setSelectedRoom({...selectedRoom, isJjimjilChecked: e.target.checked})} className="w-5 h-5 rounded-lg border-rose-300 text-rose-600 focus:ring-0 shadow-sm" />
                                                            <span className="text-xs font-black text-rose-700 flex items-center gap-1.5 uppercase"><Icon name="thermometer-sun" size={14}/> 찜질방 청소 및 온도 체크</span>
                                                        </label>
                                                    )}
                                                </div>
                                            )}
                                        </section>
                                    )}

                                    {selectedRoom.status === 'checkout' && (
                                        <section className="bg-slate-100 p-6 rounded-[2.2rem] space-y-4 border border-slate-200">
                                            <h3 className="font-black text-[10px] text-slate-500 uppercase px-1">퇴실 완료 필수 점검</h3>
                                            <div className="space-y-2">
                                                {[
                                                    { id: 'isCheckoutBoilerChecked', label: '보일러 전원 OFF' },
                                                    { id: 'isCheckoutAcChecked', label: '에어컨 전원 OFF' },
                                                    { id: 'isCheckoutDoorChecked', label: '창문 및 현관 문단속' }
                                                ].map(item => (
                                                    <label key={item.id} className="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-200 shadow-sm cursor-pointer active:bg-slate-50">
                                                        <span className="text-sm font-bold text-slate-700">{item.label}</span>
                                                        <input type="checkbox" checked={selectedRoom[item.id] || false} onChange={e => setSelectedRoom({...selectedRoom, [item.id]: e.target.checked})} className="w-6 h-6 rounded-lg border-slate-300 text-slate-900 focus:ring-0 shadow-sm" />
                                                    </label>
                                                ))}
                                            </div>
                                        </section>
                                    )}

                                    <section className="space-y-6">
                                        <input type="text" value={selectedRoom.guestName || ""} onChange={e => setSelectedRoom({...selectedRoom, guestName: e.target.value})} placeholder="투숙객 정보" className="w-full p-5 bg-slate-50 border border-slate-100 rounded-[1.5rem] font-bold outline-none focus:ring-2 focus:ring-blue-500" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <label className="flex items-center gap-3 bg-slate-50 p-5 rounded-[1.5rem] flex-1 cursor-pointer border border-slate-100 active:bg-white transition-all shadow-sm">
                                                <input type="checkbox" checked={selectedRoom.hasBBQ || false} onChange={e => setSelectedRoom({...selectedRoom, hasBBQ: e.target.checked})} className="w-5 h-5 rounded-lg border-slate-300 text-orange-600 focus:ring-0 shadow-xs" />
                                                <span className="text-sm font-bold text-slate-700">숯</span>
                                                {selectedRoom.hasBBQ && (
                                                    <select value={selectedRoom.bbqTime || ""} onChange={e => setSelectedRoom({...selectedRoom, bbqTime: e.target.value})} className="ml-auto bg-white border-none text-[11px] font-black px-2 rounded-xl shadow-xs ring-1 ring-slate-100 outline-none">
                                                        <option value="">시간</option>
                                                        {BBQ_TIMES.map(t => <option key={t} value={t}>{t}</option>)}
                                                    </select>
                                                )}
                                            </label>
                                            <label className="flex items-center gap-3 bg-slate-50 p-5 rounded-[1.5rem] flex-1 cursor-pointer border border-slate-100 active:bg-white transition-all shadow-sm">
                                                <input type="checkbox" checked={selectedRoom.hasFirePit || false} onChange={e => setSelectedRoom({...selectedRoom, hasFirePit: e.target.checked})} className="w-5 h-5 rounded-lg border-slate-300 text-red-600 focus:ring-0 shadow-xs" />
                                                <span className="text-sm font-bold text-slate-700">불멍</span>
                                            </label>
                                        </div>
                                        <textarea value={selectedRoom.memo || ""} onChange={e => setSelectedRoom({...selectedRoom, memo: e.target.value})} placeholder="전달 메모 (보존됨)" rows={4} className="w-full p-5 bg-slate-50 border border-slate-100 rounded-[1.5rem] font-bold outline-none focus:ring-2 focus:ring-blue-500 resize-none shadow-sm" />
                                    </section>
                                </form>

                                <div className="p-7 bg-white border-t border-slate-100">
                                    <button onClick={handleSave} disabled={isSaving} className="w-full bg-slate-900 text-white py-5 rounded-[2.5rem] font-black shadow-xl active:scale-95 transition-all flex justify-center items-center gap-2 text-lg disabled:bg-slate-400">
                                        {isSaving ? <Icon name="refresh-cw" className="animate-spin"/> : <Icon name="save" size={20}/>} 데이터 저장 및 업데이트
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
