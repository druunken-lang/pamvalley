<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>팜밸리 리조트 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest" crossorigin></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" crossorigin></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" crossorigin></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" crossorigin></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        select { appearance: none; outline: none; }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .check-item:active { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 사장님의 Firebase 설정값을 여기에 입력하세요 ---
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        let auth = null, db = null;
        try {
            if (firebaseConfig.apiKey && firebase.apps.length === 0) {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
            } else if (firebase.apps.length > 0) {
                auth = firebase.auth();
                db = firebase.firestore();
            }
        } catch (e) { console.error(e); }

        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const generateInitialRooms = () => [
            ...Array.from({length: 6}, (_, i) => ({ id: i+1, name: `코코스빌 ${i+1}호`, capacity: 2 })),
            ...Array.from({length: 6}, (_, i) => ({ id: i+7, name: `까멜빌 ${i+1}호`, capacity: 4 })),
            ...Array.from({length: 2}, (_, i) => ({ id: i+13, name: `오션빌 ${i+1}호`, capacity: 6 })),
            ...Array.from({length: 3}, (_, i) => ({ id: i+15, name: `워싱턴빌 ${i+1}호`, capacity: 6 }))
        ].map(r => ({
            docId: `room-${r.id}`, ...r, status: 'vacant', guestName: '', memo: '', guestCount: r.capacity,
            isWaterChecked: false, isTowelChecked: false, isBeddingChecked: false,
            isTvChecked: false, isLightChecked: false, isBoilerChecked: false, isAcChecked: false,
            isVentChecked: false, isCutleryChecked: false, isCookingUtensilChecked: false,
            isTrashBagChecked: false, isHairDryerChecked: false, isMosquitoRepellentChecked: false,
            isWindowLockedChecked: false, isCheckoutBoilerChecked: false, isCheckoutAcChecked: false,
            isCheckoutDoorChecked: false, hasBBQ: false, bbqTime: '', hasFirePit: false
        }));

        function App() {
            const [rooms, setRooms] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedRoom, setSelectedRoom] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [now, setNow] = useState(new Date());

            const STATUS = {
                vacant: { label: '공실', color: 'bg-white border-dashed border-slate-300 text-slate-400', icon: 'home' },
                reserved: { label: '입실예정', color: 'bg-orange-50 border-orange-200 text-orange-800', icon: 'clock' },
                checkedIn: { label: '입실완료', color: 'bg-emerald-50 border-emerald-200 text-emerald-800', icon: 'user-check' },
                occupied: { label: '재실', color: 'bg-blue-50 border-blue-200 text-blue-800', icon: 'user' },
                checkout: { label: '퇴실', color: 'bg-slate-100 border-slate-300 text-slate-700', icon: 'log-out' }
            };

            const BBQ_TIMES = ["15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00"];

            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (!db) { setRooms(generateInitialRooms()); setLoading(false); return; }
                auth.signInAnonymously().then(() => {
                    db.collection('hotel_rooms_v11').orderBy('id').onSnapshot(snap => {
                        if (snap.empty) {
                            generateInitialRooms().forEach(r => db.collection('hotel_rooms_v11').doc(r.docId).set(r));
                        } else {
                            const list = []; snap.forEach(doc => list.push({ docId: doc.id, ...doc.data() }));
                            setRooms(list); setLoading(false);
                        }
                    });
                });
            }, []);

            const getCheckStatus = (room) => {
                const guestCount = room.guestCount || room.capacity;
                const needsBedding = guestCount > room.capacity;
                if (room.status === 'reserved') {
                    const checks = [room.isWaterChecked, room.isTowelChecked, room.isTvChecked, room.isLightChecked, room.isBoilerChecked, room.isAcChecked, room.isVentChecked, room.isCutleryChecked, room.isCookingUtensilChecked, room.isTrashBagChecked, room.isHairDryerChecked, room.isMosquitoRepellentChecked, room.isWindowLockedChecked];
                    if (needsBedding) checks.push(room.isBeddingChecked);
                    return checks.every(Boolean);
                } else if (room.status === 'occupied') {
                    const checks = [room.isWaterChecked, room.isTowelChecked];
                    if (needsBedding) checks.push(room.isBeddingChecked);
                    return checks.every(Boolean);
                } else if (room.status === 'checkout') {
                    return [room.isCheckoutBoilerChecked, room.isCheckoutAcChecked, room.isCheckoutDoorChecked].every(Boolean);
                }
                return null;
            };

            const handleQuickUpdate = async (e, room, field, value) => {
                e.stopPropagation();
                if (!db) { setRooms(prev => prev.map(r => r.docId === room.docId ? {...r, [field]: value} : r)); return; }
                await db.collection('hotel_rooms_v11').doc(room.docId).update({ [field]: value });
            };

            const handleSave = async (e) => {
                e.preventDefault();
                const isVacant = selectedRoom.status === 'vacant';
                let data = { ...selectedRoom, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                
                if (isVacant) {
                    const resetFields = {
                        guestName: '', guestCount: selectedRoom.capacity, hasBBQ: false, bbqTime: '', hasFirePit: false,
                        isWaterChecked: false, isTowelChecked: false, isBeddingChecked: false, isTvChecked: false, isLightChecked: false,
                        isBoilerChecked: false, isAcChecked: false, isVentChecked: false, isCutleryChecked: false, isCookingUtensilChecked: false,
                        isTrashBagChecked: false, isHairDryerChecked: false, isMosquitoRepellentChecked: false, isWindowLockedChecked: false,
                        isCheckoutBoilerChecked: false, isCheckoutAcChecked: false, isCheckoutDoorChecked: false
                    };
                    Object.assign(data, resetFields);
                }
                
                if (!db) { setRooms(prev => prev.map(r => r.docId === selectedRoom.docId ? data : r)); setIsModalOpen(false); return; }
                await db.collection('hotel_rooms_v11').doc(selectedRoom.docId).set(data);
                setIsModalOpen(false);
            };

            if (loading) return <div className="flex h-screen items-center justify-center font-black text-blue-600 animate-pulse">PAMVALLEY...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-20 bg-slate-50 shadow-2xl">
                    <header className="bg-white p-6 shadow-sm sticky top-0 z-30 flex justify-between items-end border-b">
                        <div>
                            <h1 className="text-2xl font-black text-blue-600 tracking-tighter">팜밸리 리조트</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 leading-none">Smart Management v1.1</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[11px] font-bold text-slate-500 mb-0.5">{now.toLocaleDateString('ko-KR', {month:'long',day:'numeric',weekday:'short'})}</p>
                            <p className="text-xl font-black font-mono leading-none text-slate-800">{now.toLocaleTimeString('ko-KR', {hour12:false})}</p>
                        </div>
                    </header>

                    <main className="p-4 grid grid-cols-2 gap-4">
                        {rooms.map(room => {
                            const style = STATUS[room.status] || STATUS.vacant;
                            const isDone = getCheckStatus(room);
                            return (
                                <div key={room.docId} onClick={() => { setSelectedRoom({...room}); setIsModalOpen(true); }}
                                     className={`relative flex flex-col rounded-[1.5rem] border-2 p-4 shadow-sm transition-all active:scale-95 cursor-pointer hover:shadow-md ${style.color}`}>
                                    <div className="flex justify-between items-start mb-3">
                                        <span className="text-base font-black tracking-tight leading-none pt-1">{room.name}</span>
                                        <Icon name={style.icon} size={16} className="opacity-30" />
                                    </div>

                                    <div className="flex items-center gap-1.5 mb-2.5">
                                        <span className="text-[11px] font-black">{style.label}</span>
                                        {isDone !== null && (
                                            <span className={`text-[9px] font-black px-1.5 py-0.5 rounded-full ${isDone ? 'bg-emerald-500 text-white border-emerald-600' : 'bg-rose-500 text-white border-rose-600 shadow-sm'}`}>
                                                {isDone ? '체크완료' : '점검중'}
                                            </span>
                                        )}
                                    </div>

                                    <div className="text-[11px] font-bold text-slate-500 mb-4 opacity-80">
                                        {['reserved','checkedIn','occupied'].includes(room.status) ? `투숙 ${room.guestCount}명` : `기준 ${room.capacity}인`}
                                    </div>

                                    <div className="flex flex-wrap gap-2 mb-4" onClick={e => e.stopPropagation()}>
                                        <div className="flex items-center gap-1">
                                            <label className="flex items-center gap-1.5 bg-white/70 px-2 py-1.5 rounded-xl text-[10px] font-black shadow-sm border border-black/5 active:bg-white transition-colors">
                                                <input type="checkbox" checked={room.hasBBQ} onChange={e => handleQuickUpdate(e, room, 'hasBBQ', e.target.checked)} className="w-3.5 h-3.5 rounded-md border-slate-300 text-orange-600" />
                                                <span>숯</span>
                                            </label>
                                            {room.hasBBQ && (
                                                <select value={room.bbqTime} onChange={e => handleQuickUpdate(e, room, 'bbqTime', e.target.value)} 
                                                        className="bg-white/90 rounded-xl px-1.5 text-[10px] font-black shadow-sm border-none h-[25px] ring-1 ring-orange-200">
                                                    <option value="">시간</option>
                                                    {BBQ_TIMES.map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                            )}
                                        </div>
                                        <label className="flex items-center gap-1.5 bg-white/70 px-2 py-1.5 rounded-xl text-[10px] font-black shadow-sm border border-black/5 active:bg-white transition-colors">
                                            <input type="checkbox" checked={room.hasFirePit} onChange={e => handleQuickUpdate(e, room, 'hasFirePit', e.target.checked)} className="w-3.5 h-3.5 rounded-md border-slate-300 text-red-600" />
                                            <span>불멍</span>
                                        </label>
                                    </div>

                                    <div className="mt-auto flex items-center justify-between pt-2 border-t border-black/5">
                                        <span className="text-[10px] font-bold truncate max-w-[70%] text-slate-800">{room.guestName || "-"}</span>
                                        {room.memo && <div className="flex items-center gap-1 bg-yellow-400 text-[8px] font-black text-white px-1.5 rounded py-0.5 shadow-sm">메모</div>}
                                    </div>
                                </div>
                            );
                        })}
                    </main>

                    {isModalOpen && selectedRoom && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-slate-900/60 p-4 backdrop-blur-sm transition-opacity">
                            <div className="bg-white w-full max-w-sm rounded-t-[2.5rem] flex flex-col max-h-[92vh] shadow-2xl overflow-hidden animate-slide-up">
                                <div className="p-7 border-b flex justify-between items-center bg-slate-50/50">
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tighter">{selectedRoom.name}</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-white border p-2.5 rounded-2xl text-slate-400 shadow-sm"><Icon name="x" size={24}/></button>
                                </div>

                                <form onSubmit={handleSave} className="p-7 overflow-y-auto space-y-8 no-scrollbar">
                                    <section>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-4 block tracking-widest">객실 상태 설정</label>
                                        <div className="grid grid-cols-3 gap-2.5">
                                            {Object.entries(STATUS).map(([key, val]) => (
                                                <button key={key} type="button" onClick={() => setSelectedRoom({...selectedRoom, status: key})} 
                                                        className={`py-3.5 text-[12px] font-black rounded-2xl border-2 transition-all flex flex-col items-center gap-1 ${selectedRoom.status === key ? val.color + ' border-current scale-105 shadow-md' : 'border-slate-100 text-slate-300 hover:bg-slate-50'}`}>
                                                    {val.label}
                                                </button>
                                            ))}
                                        </div>
                                    </section>

                                    {(selectedRoom.status === 'reserved' || selectedRoom.status === 'occupied') && (
                                        <section className={`p-6 rounded-[2.2rem] border-2 space-y-6 ${selectedRoom.status === 'reserved' ? 'bg-orange-50/50 border-orange-100' : 'bg-blue-50/50 border-blue-100'}`}>
                                            <div className="flex items-center justify-between mb-2">
                                                <h3 className={`font-black text-sm ${selectedRoom.status === 'reserved' ? 'text-orange-800' : 'text-blue-800'}`}>준비 점검 목록</h3>
                                                <div className="flex items-center gap-1 bg-white px-2.5 py-1.5 rounded-xl shadow-sm border border-black/5">
                                                    <input type="number" min="1" value={selectedRoom.guestCount} 
                                                           onChange={e => setSelectedRoom({...selectedRoom, guestCount: parseInt(e.target.value)||1})} 
                                                           className="w-7 text-center text-xs font-black outline-none" />
                                                    <span className="text-[10px] font-bold text-slate-400">인</span>
                                                </div>
                                            </div>

                                            <div className="space-y-3">
                                                <label className="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm cursor-pointer check-item">
                                                    <span className="text-sm font-bold text-slate-700">생수 {selectedRoom.guestCount}개 비치</span>
                                                    <input type="checkbox" checked={selectedRoom.isWaterChecked} onChange={e => setSelectedRoom({...selectedRoom, isWaterChecked: e.target.checked})} className="w-6 h-6 rounded-lg border-slate-200 text-blue-600 focus:ring-0" />
                                                </label>
                                                <label className="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm cursor-pointer check-item">
                                                    <span className="text-sm font-bold text-slate-700">타올 {selectedRoom.guestCount * 2}장 비치</span>
                                                    <input type="checkbox" checked={selectedRoom.isTowelChecked} onChange={e => setSelectedRoom({...selectedRoom, isTowelChecked: e.target.checked})} className="w-6 h-6 rounded-lg border-slate-200 text-blue-600 focus:ring-0" />
                                                </label>
                                                {selectedRoom.guestCount > selectedRoom.capacity && (
                                                    <label className="flex items-center justify-between p-4 bg-white rounded-2xl border-orange-200 bg-orange-50 shadow-sm cursor-pointer">
                                                        <span className="text-sm font-black text-orange-700">추가 침구 {selectedRoom.guestCount - selectedRoom.capacity}세트</span>
                                                        <input type="checkbox" checked={selectedRoom.isBeddingChecked} onChange={e => setSelectedRoom({...selectedRoom, isBeddingChecked: e.target.checked})} className="w-6 h-6 rounded-lg border-orange-300 text-orange-600" />
                                                    </label>
                                                )}
                                            </div>

                                            {selectedRoom.status === 'reserved' && (
                                                <div className="grid grid-cols-2 gap-3 pt-3 border-t border-black/5">
                                                    {[
                                                        { id: 'isTvChecked', label: 'TV' }, { id: 'isLightChecked', label: '전등' }, { id: 'isBoilerChecked', label: '보일러' },
                                                        { id: 'isAcChecked', label: '에어컨' }, { id: 'isVentChecked', label: '환풍기' }, { id: 'isCutleryChecked', label: '수저세트' },
                                                        { id: 'isCookingUtensilChecked', label: '조리도구' }, { id: 'isTrashBagChecked', label: '재활용봉투' }, { id: 'isHairDryerChecked', label: '드라이기' },
                                                        { id: 'isMosquitoRepellentChecked', label: '모기약' }, { id: 'isWindowLockedChecked', label: '창문잠금' }
                                                    ].map(item => (
                                                        <label key={item.id} className="flex items-center gap-2 p-3 bg-white/70 rounded-2xl border border-white cursor-pointer active:bg-white transition-all">
                                                            <input type="checkbox" checked={selectedRoom[item.id]} onChange={e => setSelectedRoom({...selectedRoom, [item.id]: e.target.checked})} className="w-4 h-4 rounded-lg border-slate-300 text-orange-600 focus:ring-0" />
                                                            <span className="text-[11px] font-bold text-slate-600 truncate">{item.label}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            )}
                                        </section>
                                    )}

                                    {selectedRoom.status === 'checkout' && (
                                        <section className="bg-slate-100 p-6 rounded-[2.2rem] space-y-4 border border-slate-200">
                                            <h3 className="font-black text-xs text-slate-500 px-1 uppercase tracking-tighter">퇴실 완료 필수 점검</h3>
                                            <div className="space-y-2">
                                                {[
                                                    { id: 'isCheckoutBoilerChecked', label: '보일러 전원 OFF' },
                                                    { id: 'isCheckoutAcChecked', label: '에어컨 전원 OFF' },
                                                    { id: 'isCheckoutDoorChecked', label: '창문 및 현관 문단속' }
                                                ].map(item => (
                                                    <label key={item.id} className="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-200 shadow-sm cursor-pointer active:bg-slate-50">
                                                        <span className="text-sm font-bold text-slate-700">{item.label}</span>
                                                        <input type="checkbox" checked={selectedRoom[item.id]} onChange={e => setSelectedRoom({...selectedRoom, [item.id]: e.target.checked})} className="w-6 h-6 rounded-lg border-slate-300 text-slate-900 focus:ring-0" />
                                                    </label>
                                                ))}
                                            </div>
                                        </section>
                                    )}

                                    <section className="space-y-6">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block tracking-widest">투숙객 정보</label>
                                            <input type="text" value={selectedRoom.guestName} onChange={e => setSelectedRoom({...selectedRoom, guestName: e.target.value})} placeholder="고객 성함" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-500" />
                                        </div>

                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block tracking-widest flex justify-between">추가 옵션 <span>숯 & 불멍</span></label>
                                            <div className="flex gap-4">
                                                <label className="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl flex-1 cursor-pointer border border-slate-100 active:bg-white transition-all shadow-sm">
                                                    <input type="checkbox" checked={selectedRoom.hasBBQ} onChange={e => setSelectedRoom({...selectedRoom, hasBBQ: e.target.checked})} className="w-5 h-5 rounded-lg border-slate-300 text-orange-600 focus:ring-0" />
                                                    <span className="text-sm font-bold text-slate-700">숯</span>
                                                    {selectedRoom.hasBBQ && (
                                                        <select value={selectedRoom.bbqTime} onChange={e => setSelectedRoom({...selectedRoom, bbqTime: e.target.value})} className="bg-white border-none text-[11px] font-black px-2 rounded-xl shadow-sm outline-none ring-1 ring-slate-100">
                                                            <option value="">시간</option>
                                                            {BBQ_TIMES.map(t => <option key={t} value={t}>{t}</option>)}
                                                        </select>
                                                    )}
                                                </label>
                                                <label className="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl flex-1 cursor-pointer border border-slate-100 active:bg-white transition-all shadow-sm">
                                                    <input type="checkbox" checked={selectedRoom.hasFirePit} onChange={e => setSelectedRoom({...selectedRoom, hasFirePit: e.target.checked})} className="w-5 h-5 rounded-lg border-slate-300 text-red-600 focus:ring-0" />
                                                    <span className="text-sm font-bold text-slate-700">불멍</span>
                                                </label>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block flex justify-between tracking-widest">전달 메모 <span className="font-normal normal-case text-blue-500">영구 보존됨</span></label>
                                            <textarea value={selectedRoom.memo} onChange={e => setSelectedRoom({...selectedRoom, memo: e.target.value})} placeholder="특이사항을 입력하세요..." rows={3} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold resize-none outline-none focus:ring-2 focus:ring-blue-500" />
                                        </div>
                                    </section>
                                </form>

                                <div className="p-7 bg-white border-t border-slate-100 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                                    <button onClick={handleSave} className="w-full bg-slate-900 text-white py-5 rounded-[2.5rem] font-black shadow-xl active:scale-95 transition-all text-lg">
                                        데이터 업데이트 및 저장
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
